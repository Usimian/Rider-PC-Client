# Controller is selected per GIT BRANCH (easy to follow):
#   main    -> RL policy   (this file: default_envs = esp32)
#   cascade -> factory PID  (that branch: default_envs = esp32_cascade)
# Both env definitions live in both branches; only this default_envs line differs, so a bare
# `pio run [-t upload]` on a branch always builds that branch's controller -- no -e flag, no mixups.
[platformio]
default_envs = esp32

# RL policy controller -- the one that balances.  Build/flash:  pio run -t upload
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/ttyUSB0
upload_speed = 460800
monitor_port = /dev/ttyUSB0
monitor_speed = 115200
build_flags =
    -DSERVO_RX_PIN=13
    -DSERVO_TX_PIN=14
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0

# Cascade-only build (factory-style PID), kept for A/B testing -- never co-resident with the
# policy, so it can't be armed by accident.  Flash with:  pio run -e esp32_cascade -t upload
[env:esp32_cascade]
extends = env:esp32
build_flags =
    ${env:esp32.build_flags}
    -DCONTROLLER_CASCADE
