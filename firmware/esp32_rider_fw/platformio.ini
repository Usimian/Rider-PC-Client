# Controller is selected at COMPILE TIME -- both live in one tree, no branch juggling:
#   esp32      -> RL policy   (no flag)
#   esp32_lqr  -> LQR full-state controller  (-DCONTROLLER_LQR)
# Both controllers live together in src/main.cpp, split by #ifdef CONTROLLER_LQR, so exactly
# ONE is compiled into a given binary (can't be armed by accident). Pick with -e, e.g.
#   pio run -e esp32 -t upload      (policy)
#   pio run -e esp32_lqr -t upload  (LQR)
# default_envs sets which a bare `pio run` builds.
[platformio]
default_envs = esp32_lqr

# RL policy controller.  Build/flash:  pio run -e esp32 -t upload
[env:esp32]
platform = espressif32
board = esp32dev
framework = arduino
upload_port = /dev/ttyUSB0
upload_speed = 460800
monitor_port = /dev/ttyUSB0
monitor_speed = 115200
build_flags =
    -DSERVO_RX_PIN=13
    -DSERVO_TX_PIN=14
lib_deps =
    adafruit/Adafruit NeoPixel @ ^1.12.0

# LQR full-state controller -- never co-resident with the policy (compile-time #ifdef),
# so it can't be armed by accident.  Flash with:  pio run -e esp32_lqr -t upload
[env:esp32_lqr]
extends = env:esp32
build_flags =
    ${env:esp32.build_flags}
    -DCONTROLLER_LQR
